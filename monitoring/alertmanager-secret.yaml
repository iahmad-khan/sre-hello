# Credentials for Alertmanager receivers.
# DO NOT commit real values — this file is a template.
# Use a secrets manager (Vault, Sealed Secrets, External Secrets Operator)
# in production to inject these values at deploy time.
#
# Quick setup (replace placeholder values before applying):
#
#   kubectl create secret generic alertmanager-slack-secret \
#     --from-literal=webhook-url='https://hooks.slack.com/services/T.../B.../...' \
#     -n sre-demo
#
#   kubectl create secret generic alertmanager-pagerduty-secret \
#     --from-literal=routing-key='your-pagerduty-events-v2-integration-key' \
#     -n sre-demo
#
# Or apply this file after base64-encoding your real values:
#   echo -n 'https://hooks.slack.com/services/...' | base64
#   echo -n 'your-pd-key' | base64
# ─────────────────────────────────────────────────────────────────────────────

# ── Slack incoming webhook ────────────────────────────────────────────────────
# To create:
#   1. Go to https://api.slack.com/apps → Create App → From scratch
#   2. Add "Incoming Webhooks" feature → Activate
#   3. "Add New Webhook to Workspace" → select #prod-alerts
#   4. Copy the webhook URL (https://hooks.slack.com/services/T.../B.../..)
---
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-slack-secret
  namespace: sre-demo
  labels:
    app.kubernetes.io/name: sre-hello-world
    app.kubernetes.io/component: alerting
type: Opaque
stringData:
  webhook-url: "https://hooks.slack.com/services/REPLACE_ME/REPLACE_ME/REPLACE_ME"

---
# ── PagerDuty Events API v2 integration key ───────────────────────────────────
# To create:
#   1. Go to PagerDuty → Services → (your service) → Integrations
#   2. Add Integration → "Events API v2"
#   3. Copy the "Integration Key" (32-char hex string)
#
# The AlertmanagerConfig uses routingKey (Events API v2), NOT the service key.
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-pagerduty-secret
  namespace: sre-demo
  labels:
    app.kubernetes.io/name: sre-hello-world
    app.kubernetes.io/component: alerting
type: Opaque
stringData:
  routing-key: "REPLACE_ME_WITH_32_CHAR_PD_INTEGRATION_KEY"
