# Bitnami Redis Helm chart values for HA Sentinel cluster
# Deploy with:
#   helm repo add bitnami https://charts.bitnami.com/bitnami
#   helm install redis bitnami/redis -n redis --create-namespace -f helm/redis-ha-values.yaml

# ── Architecture: replication + sentinel ─────────────────────────────────────
architecture: replication

auth:
  enabled: true
  existingSecret: redis-secret          # K8s Secret must exist before install
  existingSecretPasswordKey: redis-password

# ── Master ────────────────────────────────────────────────────────────────────
master:
  count: 1
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""                    # set to your storage class
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  podAntiAffinityPreset: hard           # force master onto a different node

# ── Replicas ─────────────────────────────────────────────────────────────────
replica:
  replicaCount: 2                       # 1 master + 2 replicas = 3 total nodes
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  podAntiAffinityPreset: hard           # spread replicas across nodes

# ── Sentinel (HA failover) ────────────────────────────────────────────────────
sentinel:
  enabled: true
  masterSet: mymaster
  quorum: 2                             # majority of 3 sentinel nodes
  downAfterMilliseconds: 5000
  failoverTimeout: 10000
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ── Prometheus exporter sidecar ───────────────────────────────────────────────
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring               # matches Prometheus operator watch ns
    interval: 30s
  prometheusRule:
    enabled: true
    namespace: monitoring
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis node down"
          description: "Redis instance {{ "{{" }} $labels.instance {{ "}}" }} is down."
      - alert: RedisMissingMaster
        expr: redis_sentinel_master_ok_slaves < 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Redis sentinel master has no OK replicas"
      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage above 85%"

# ── Pod Disruption Budget ─────────────────────────────────────────────────────
pdb:
  create: true
  minAvailable: 2                       # always keep 2 of 3 nodes

# ── Network policy ────────────────────────────────────────────────────────────
networkPolicy:
  enabled: false                        # enable if your cluster uses Cilium/Calico
